services:
  db:
    image: postgres:16-alpine
    container_name: samba-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaic1806
      POSTGRES_DB: samba_db
    volumes:
      - samba_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d samba_db']
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - '5433:5432' # expõe o Postgres do container na 5433 (evita conflito com um Postgres local na 5432)

  app:
    build: .
    container_name: samba-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:kaic1806@db:5432/samba_db
      NEXTAUTH_SECRET: troque-este-segredo-antes-de-publicar
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3000:3000'

volumes:
  samba_db_data:
